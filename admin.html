<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gemstone Admin</title><link rel="stylesheet" href="styles.css"></head><body><header><h1>Gemstone Admin</h1><nav><a href="index.html">Customer site</a></nav></header><main><div id="notice" class="notice hidden"></div><section id="adminLogin" class="card narrow"><h2>Admin login</h2><form id="adminLoginForm"><label>Username<input id="adminUsername" required value="admin"></label><label>Password<input id="adminPassword" type="password" required></label><button type="submit">Open admin</button></form><p>Default: admin / ChangeMe123!</p></section><section id="adminDashboard" class="hidden"><button id="refreshAdmin">Refresh</button><div class="stats"><div class="card">Members<strong id="statMembers">0</strong></div><div class="card">Pending<strong id="statPending">0</strong></div><div class="card">Approved funds<strong id="statApproved">₱0</strong></div><div class="card">Active memberships<strong id="statActive">0</strong></div></div><div class="card"><h3>Pending deposits</h3><div class="table-wrap"><table><thead><tr><th>Member</th><th>Amount</th><th>Method</th><th>Reference</th><th>Proof</th><th>Action</th></tr></thead><tbody id="pendingBody"></tbody></table></div></div><div class="card"><h3>Members</h3><div class="table-wrap"><table><thead><tr><th>Member</th><th>Wallet</th><th>Membership</th><th>Points</th><th>Claims</th><th>Perk note</th></tr></thead><tbody id="membersBody"></tbody></table></div></div></section></main><script src="config.js"></script><script src="admin.js"></script></body></html>
