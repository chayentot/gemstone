<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wallet</title><link rel="stylesheet" href="styles.css"></head><body><div class="shell"><aside class="sidebar"><div class="brand"><div class="brand-icon">💎</div><div><h1>Gemstone Rewards</h1><p>Member Portal</p></div></div><nav class="side-nav"><a class="" href="dashboard.html">Dashboard</a><a class="" href="gemstones.html">Gemstones</a><a class="active" href="wallet.html">Wallet</a><a class="" href="withdraw.html">Withdraw</a><a class="" href="history.html">History</a><a class="" href="profile.html">Profile</a></nav><button id="logoutBtn" class="secondary full" style="margin-top:18px">Log out</button></aside><main class="page-main"><div id="notice" class="notice hidden"></div><div class="page-head"><div><h2>Wallet</h2><p class="muted">Send funds, then submit amount, method, and reference.</p></div><button id="refreshBtn" class="secondary">Refresh</button></div><div class="stats-grid"><article class="stat-card"><span>Wallet balance</span><strong id="walletBalance">₱0</strong></article><article class="stat-card"><span>Pending deposits</span><strong id="pendingDeposits">0</strong></article></div><section class="panel"><div class="page-head"><div><h3>Add funds</h3><p class="muted">Send directly to one of these accounts.</p></div><button id="openAddFunds" class="primary">Add Funds</button></div><div class="payment-accounts"><article><strong>GCash</strong><span id="gcashName"></span><code id="gcashNumber"></code></article><article><strong>Maya</strong><span id="mayaName"></span><code id="mayaNumber"></code></article></div></section><section class="panel"><h3>Deposit history</h3><div id="depositHistory" class="history-list"></div></section><div id="addFundsModal" class="modal hidden"><div class="panel modal-card"><div class="modal-head"><h3>Add Funds</h3><button id="closeAddFunds" class="modal-close">×</button></div><form id="depositForm"><label>Amount<input id="depositAmount" type="number" min="1" required></label><label>Method<select id="depositMethod"><option>GCash</option><option>Maya</option></select></label><label>Reference<input id="depositReference" required></label><button class="primary full">Submit</button></form></div></div></main></div><script src="config.js"></script><script src="customer.js"></script></body></html>
